name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  verify:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Write CI server env
        run: |
          cat > apps/server/.env-cmdrc <<'JSON'
          {
            "testing": {
              "JWT_KEY": "",
              "TZ": "UTC",
              "SERVER_PORT": "3002",
              "DEV_TYPE": "testing",
              "DB_HOST": "127.0.0.1",
              "DB_PORT": "5432",
              "DB_USER": "postgres",
              "DB_PASSWORD": "postgres",
              "DB_NAME": "ossie_test",
              "DB_MAX_POOL": "10",
              "NODE_ENV": "test",
              "COOKIE_SECRET": "ci-cookie-secret-at-least-20-chars",
              "OSSIE_DEPLOYMENT_MODE": "self_hosted",
              "OSSIE_ONBOARDING_MODE": "first_run_setup",
              "OSSIE_CORS_ALLOWED_ORIGINS": "http://localhost:3000,http://localhost:4000",
              "OSSIE_LOCAL_STORAGE_ROOT": "./storage-test",
              "OSSIE_MAX_SCREENSHOT_UPLOAD_BYTES": "10485760",
              "API_URL": "http://localhost:3002",
              "AUTH_REDIRECT_URL": "http://localhost:3000/"
            }
          }
          JSON

      - name: Server tests
        run: pnpm --filter server test

      - name: Web tests
        run: pnpm --filter web test

      - name: Extension tests
        run: pnpm --filter extension test

      - name: Database tests
        run: |
          pnpm --filter server test:db:drop
          pnpm --filter server test:db:create
          pnpm --filter server test:migrate
          pnpm --filter server test:db

      - name: Server smoke workflow
        run: |
          pnpm --filter server test:db:drop
          pnpm --filter server test:db:create
          pnpm --filter server test:migrate
          pnpm --filter server test:smoke

      - name: Typecheck
        run: pnpm check-types

      - name: Build
        run: pnpm build

      - name: Lint
        run: pnpm lint

      - name: Whitespace check
        run: git diff --check
