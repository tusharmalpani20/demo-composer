services:
  postgres:
    image: postgres:16
    container_name: ossie-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ossie
      POSTGRES_PASSWORD: ossie
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"
    volumes:
      - ossie_postgres:/var/lib/postgresql/data

volumes:
  ossie_postgres:
